<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de CURP Oficial</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 550px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; text-transform: uppercase; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #0066cc; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #004c99; }
        
        .btn-descargar { background-color: #28a745; margin-top: 20px; display: none; }
        .btn-descargar:hover { background-color: #218838; }

        .mensaje { text-align: center; font-weight: bold; margin-top: 15px; color: #d9534f; }
        .cargando { color: #f0ad4e; }
        .resultado { margin-top: 20px; padding: 20px; background-color: #e9ecef; border-radius: 5px; display: none; }
        .resultado p { margin: 8px 0; font-size: 15px; border-bottom: 1px solid #d1d1d1; padding-bottom: 5px; }
        .resultado strong { color: #333; display: inline-block; width: 180px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Consulta de CURP</h2>
    <input type="text" id="curpInput" placeholder="Escribe la CURP a 18 posiciones" maxlength="18">
    <button onclick="consultarCurp()">Buscar CURP</button>

    <div id="estadoMensaje" class="mensaje"></div>

    <div id="cajaResultado" class="resultado">
        <p><strong>CURP:</strong> <span id="resCurp"></span></p>
        <p><strong>Nombre(s):</strong> <span id="resNombre"></span></p>
        <p><strong>Primer Apellido:</strong> <span id="resApellido1"></span></p>
        <p><strong>Segundo Apellido:</strong> <span id="resApellido2"></span></p>
        <p><strong>Sexo:</strong> <span id="resSexo"></span></p>
        <p><strong>Fecha de Nacimiento:</strong> <span id="resFechaNacimiento"></span></p>
        <p><strong>Nacionalidad:</strong> <span id="resNacionalidad"></span></p>
        <p><strong>Entidad de Nacimiento:</strong> <span id="resEntidadNacimiento"></span></p>
        <p><strong>Documento Probatorio:</strong> <span id="resDoc"></span></p>
        <p><strong>Año de registro:</strong> <span id="resAnio"></span></p>
        <p><strong>Número de acta:</strong> <span id="resActa"></span></p>
        <p><strong>Entidad de registro:</strong> <span id="resEntidad"></span></p>
        <p><strong>Municipio de Registro:</strong> <span id="resMunicipio"></span></p>
        
        <button id="btnDescargarPDF" class="btn-descargar">⬇️ Descargar PDF Oficial</button>
    </div>
</div>

<script>
    async function consultarCurp() {
        const curp = document.getElementById('curpInput').value.trim().toUpperCase();
        const mensaje = document.getElementById('estadoMensaje');
        const cajaResultado = document.getElementById('cajaResultado');
        const btnDescargarPDF = document.getElementById('btnDescargarPDF');

        cajaResultado.style.display = 'none';
        btnDescargarPDF.style.display = 'none';
        mensaje.innerText = '';
        mensaje.className = 'mensaje';

        if (curp.length !== 18) {
            mensaje.innerText = '⚠️ La CURP debe tener exactamente 18 caracteres.';
            return;
        }

        mensaje.innerText = '⏳ Buscando y extrayendo documento original...';
        mensaje.className = 'mensaje cargando';

        try {
            const url = 'https://api-curp.onrender.com/scrape-curp?curp=' + curp;
            
            const respuesta = await fetch(url);
            const datos = await respuesta.json();

            if (datos.error) {
                throw new Error("El servidor reporta: " + datos.error);
            }

            if (!datos.nombre) {
                throw new Error("El servidor no devolvió datos. Es posible que la CURP sea incorrecta.");
            }

            document.getElementById('resCurp').innerText = datos.curp;
            document.getElementById('resNombre').innerText = datos.nombre;
            document.getElementById('resApellido1').innerText = datos.primerApellido;
            document.getElementById('resApellido2').innerText = datos.segundoApellido;
            document.getElementById('resSexo').innerText = datos.sexo;
            document.getElementById('resFechaNacimiento').innerText = datos.fechaNacimiento;
            document.getElementById('resNacionalidad').innerText = datos.nacionalidad;
            document.getElementById('resEntidadNacimiento').innerText = datos.entidadNacimiento;
            document.getElementById('resDoc').innerText = datos.docProbatorio;
            document.getElementById('resAnio').innerText = datos.anioRegistro;
            document.getElementById('resActa').innerText = datos.numeroActa;
            document.getElementById('resEntidad').innerText = datos.entidadRegistro;
            document.getElementById('resMunicipio').innerText = datos.municipioRegistro;

            // Configurar el botón para que descargue el PDF real
            if (datos.pdfOficial) {
                btnDescargarPDF.innerText = "⬇️ Descargar PDF Oficial";
                btnDescargarPDF.onclick = function() {
                    const enlace = document.createElement('a');
                    enlace.href = 'data:application/pdf;base64,' + datos.pdfOficial;
                    enlace.download = 'CURP_' + datos.curp + '.pdf';
                    enlace.click();
                };
            } else {
                btnDescargarPDF.innerText = "🖨️ Imprimir Datos (PDF no disponible)";
                btnDescargarPDF.onclick = () => window.print();
            }

            mensaje.innerText = '';
            cajaResultado.style.display = 'block';
            btnDescargarPDF.style.display = 'block';

        } catch (error) {
            mensaje.innerText = `❌ Error: ${error.message}`;
            mensaje.className = 'mensaje';
        }
    }
</script>

</body>
</html>
